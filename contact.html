<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feel free for contact. :D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="container-flex">
            <h1 class="main-title">The mightest portfolio</h1>
            <h5 class="sub-main-title">"Maybe."</h5>

            <nav class="site-navigation">
                <a href="index.html">Home</a>
                <a href="projects.html">Projects</a>
                <a href="skills.html">Skills</a>
                <a href="contact.html">Contacts</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="subpage-header">
            <h2>Contacts</h2>
            <p>
                Maybe one day... your message will reach my interest. >:D
            </p>
        </section>

        <section class="contact">
            <form class="contact-form" action="?" method="post">
                <div class="form-object">
                    <label for="name">Junwon Lim</label>
                    <p></p>
                    <input type="text" id="name" name="name" placeholder="Enter your name.">
                </div>

                <div class="form-object">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your mail address.">
                </div>

                <div class="form-object">
                    <label for="message">Message</label>
                    <textarea type="message" id="message" name="message" rows="5" placeholder="Please write your message."></textarea>
                </div>

                <button type="submit">Send now.</button>
            </form>
        </section>
    </main>

    <footer class="rabbit-foot">
        <div class="container">
            <p>2026 Junwon Lim. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
